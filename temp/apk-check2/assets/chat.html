<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" value="#EDEDED">
    <title>微信 - 万能任务</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Helvetica Neue",sans-serif;background:#EDEDED;color:#111;max-width:375px;margin:0 auto;min-height:100vh}

        /* 微信风格导航 */
        .nav-bar{background:#EDEDED;padding:8px 12px;display:flex;align-items:center;border-bottom:1px solid #D9D9D9;padding-top:28px}
        .nav-title{flex:1;font-size:17px;font-weight:500;text-align:center;margin-right:32px}
        .nav-btn{font-size:20px;cursor:pointer;background:none;border:none;color:#03A9F4;font-weight:500;padding:2px 8px}

        /* 搜索栏（微信风格）*/
        .search-bar{background:#EDEDED;padding:6px 10px;display:flex;align-items:center;gap:8px}
        .search-input{flex:1;background:#fff;border-radius:6px;padding:7px 12px;font-size:14px;border:1px solid #D9D9D9;outline:none}
        .search-input:focus{border-color:#07C160}
        .search-icon-btn{font-size:18px;cursor:pointer;background:none;border:none;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
        .add-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:none;border:none;color:#000}

        /* 聊天列表项 - 微信风格 */
        .chat-list{padding:0}
        .chat-item{display:flex;align-items:center;padding:12px;background:#fff;cursor:pointer;position:relative;-webkit-tap-highlight-color:#f5f5f5;transition:background .15s}
        .chat-item:active{background:#f5f5f5}
        .chat-item::after{content:'';position:absolute;left:88px;right:0;bottom:0;height:.5px;background:#E5E4E7}

        /* 头像 */
        .chat-avatar{width:48px;height:48px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;font-weight:600;flex-shrink:0;position:relative}
        .chat-avatar-dot{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;background:#CCC}
        .chat-avatar-dot.online{background:#4CD964}

        /* 信息区 */
        .chat-info{flex:1;min-width:0;margin-left:12px}
        .chat-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
        .chat-name{font-size:16px;font-weight:400;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        /* 免打扰/置顶图标 */
        .chat-mute-icon{font-size:13px;margin-left:4px;color:#bbb}
        .chat-pin-icon{font-size:11px;color:#FFD700;margin-left:3px}
        .chat-time{font-size:12px;color:#B2B2B2;flex-shrink:0;margin-left:8px}
        .chat-msg-row{display:flex;align-items:center;justify-content:space-between}
        .chat-preview{font-size:13px;color:#B2B2B2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;padding-right:8px;display:flex;align-items:center;gap:3px}
        .chat-preview-prefix{color:red;font-size:12px;flex-shrink:0}
        .chat-badge{background:#FA5151;color:#fff;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-weight:500;flex-shrink:0}

        /* Tab栏 */
        .tab-bar{height:56px;background:#F7F7F7;border-top:.5px solid #D0D0D0;display:flex;justify-content:space-around;align-items:center;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:375px;padding-bottom:0;z-index:100}
        .tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#999;font-size:10px;padding-top:5px}
        .tab-item.active{color:#07C160}
        .tab-icon{font-size:22px;line-height:1}

        /* 公告弹窗 */
        .announce-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center}
        .announce-overlay.show{display:flex}
        .announce-box{background:#fff;border-radius:14px;width:310px;max-height:420px;overflow:hidden}
        .announce-header{background:linear-gradient(135deg,#FFD700,#FFA000);padding:18px;text-align:center}
        .announce-header-icon{font-size:40px}
        .announce-header-title{font-size:17px;font-weight:600;color:#000;margin-top:6px}
        .announce-body{padding:14px 16px;max-height:300px;overflow-y:auto}
        .announce-item{padding:12px 0;border-bottom:1px solid #f0f0f0}
        .announce-item:last-child{border-bottom:none}
        .announce-item-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-right:6px}
        .tag-hot{background:#FFF3E0;color:#E65100}
        .tag-new{background:#E3F2FD;color:#1565C0}
        .tag-sys{background:#E8F5E9;color:#2E7D32}
        .announce-item-title{font-size:14px;font-weight:500;margin-bottom:4px}
        .announce-item-desc{font-size:12px;color:#888}
        .announce-item-time{font-size:11px;color:#bbb;margin-top:4px}
        .announce-close{display:block;width:100%;padding:14px;background:#f5f5f5;border:none;border-top:1px solid #eee;font-size:15px;color:#333;cursor:pointer;font-weight:500}

        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;z-index:4000;animation:fadeInOut 2s ease forwards}
        @keyframes fadeInOut{0%{opacity:0}15%{opacity:1}85%{opacity:1}100%{opacity:0}}
    </style>
</head>
<body>

<!-- 导航栏 -->
<div class="nav-bar">
    <div></div>
    <div class="nav-title">全部消息</div>
    <button class="nav-btn" onclick="showAnnounce()">📢</button>
</div>

<!-- 搜索栏 -->
<div class="search-bar">
    <input type="text" class="search-input" placeholder="🔍 搜索">
    <button class="add-btn" onclick="showToast('添加好友功能开发中')">＋</button>
</div>

<!-- 列表 -->
<div class="chat-list" id="chatList"></div>

<!-- Tab -->
<div class="tab-bar">
    <div class="tab-item" onclick="switchTab('home')"><div class="tab-icon">🏠</div><span>首页</span></div>
    <div class="tab-item active"><div class="tab-icon">💬</div><span>微信</span></div>
    <div class="tab-item" onclick="switchTab('plan')"><div class="tab-icon">📋</div><span>计划</span></div>
    <div class="tab-item" onclick="switchTab('profile')"><div class="tab-icon">👤</div><span>我的</span></div>
</div>

<!-- 公告弹窗 -->
<div class="announce-overlay" id="announceOverlay" onclick="hideAnnounce(event)">
    <div class="announce-box" onclick="event.stopPropagation()">
        <div class="announce-header">
            <div class="announce-header-icon">📢</div>
            <div class="announce-header-title">公告与活动</div>
        </div>
        <div class="announce-body" id="announceBody"></div>
        <button class="announce-close" onclick="document.getElementById('announceOverlay').classList.remove('show')">关闭</button>
    </div>
</div>

<script src="app-core.js"></script>
<script src="app-update.js"></script>
<script>
// ========== 数据 ==========
let chatList = [
    {
        id:1,name:'张*（发布者）',avatar:'张',avatarBg:'linear-gradient(135deg,#667eea,#764ba2)',
        lastMsg:'收到，我看了下需求，大概3天出第一版',lastMsgPrefix:'[图片]',time:'09:40',
        unread:2,online:true,pinned:false,muted:false
    },
    {
        id:2,name:'李*（开发者）',avatar:'李',avatarBg:'linear-gradient(135deg,#f093fb,#f5576c)',
        lastMsg:'微信支付沙箱环境跑通了，没问题 ✅',time:'昨天',unread:1,
        online:true,pinned:false,muted:false
    },
    {
        id:3,name:'王*（客户）',avatar:'王',avatarBg:'linear-gradient(135deg,#4facfe,#00f2fe)',
        lastMsg:'好的好的，合作愉快！',time:'昨天',unread:0,
        online:false,pinned:true,muted:true
    },
    // 系统通知类
    {
        id:99,name:'万能任务官方',avatar:'📢',avatarBg:'linear-gradient(135deg,#43e97b,#38f9d7)',
        lastMsg:'【加精任务上线】优质任务可申请加精置顶，获得更多曝光机会！点击查看详情 >>',time:'10:00',
        unread:1,online:true,pinned:true,muted:false,isSystem:true
    },
    {
        id:98,name:'系统通知',avatar:'🔔',avatarBg:'linear-gradient(135deg,#a8edea,#fed6e3)',
        lastMsg:'您有1个任务即将到期，请及时处理',time:'昨天',
        unread:0,online:false,pinned:false,muted:false,isSystem:true
    }
];

const ANNOUNCE_DATA = [
    {tag:'hot',cls:'tag-hot',label:'🔥热门',title:'五一接单奖励翻倍活动进行中',desc:'5月1日-5日期间完成订单奖励金翻倍，上不封顶！',time:'10分钟前'},
    {tag:'new',cls:'tag-new',label:'🆕新规',title:'「加精」功能正式上线',desc:'优质帖子可被管理员加精，获得金色徽章+置顶曝光',time:'1小时前'},
    {tag:'sys',cls:'tag-sys',label:'📢系统',title:'APP已升级至v4.7版本',desc:'全新微信风格聊天界面 · 加精系统 · VIP会员中心 · 更多功能等您体验',time:'今天 09:00'},
];

// ========== 渲染 ==========
function renderList(){
    const container = document.getElementById('chatList');
    let html = '';

    // 置顶的排前面
    const pinned = chatList.filter(c => c.pinned);
    const normal = chatList.filter(c => !c.pinned);

    if(pinned.length > 0){
        pinned.forEach(c => html += buildItem(c));
        html += `<div style="height:8px;background:#EDEDED"></div>`;
    }
    normal.forEach(c => html += buildItem(c));

    container.innerHTML = html;
}

function buildItem(c){
    const dotClass = c.online ? 'online' : '';
    const pinIcon = c.pinned ? '<span class="chat-pin-icon">📌</span>' : '';
    const muteIcon = c.muted ? '<span class="chat-mute-icon">🔕</span>' : '';

    let previewHtml = '';
    if(c.lastMsgPrefix){
        previewHtml += `<span class="chat-preview-prefix">${c.lastMsgPrefix}</span>`;
    }
    previewHtml += `<span>${c.lastMsg}</span>`;

    return `
    <div class="chat-item" onclick="openChat(${c.id})">
        <div class="chat-avatar" style="background:${c.avatarBg}">${c.avatar}<div class="chat-avatar-dot ${dotClass}"></div></div>
        <div class="chat-info">
            <div class="chat-name-row"><span class="chat-name">${c.name}${pinIcon}${muteIcon}</span><span class="chat-time">${c.time}</span></div>
            <div class="chat-msg-row"><div class="chat-preview">${previewHtml}</div>${c.unread > 0 ? `<div class="chat-badge">${c.unread > 99 ? '99+' : c.unread}</div>` : ''}</div>
        </div>
    </div>`;
}

function openChat(id){ window.location.href = `chat-detail.html?id=${id}`; }

// ========== 公告 ==========
function showAnnounce(){
    const body = document.getElementById('announceBody');
    body.innerHTML = ANNOUNCE_DATA.map(a => `
        <div class="announce-item">
            <div class="announce-item-title"><span class="announce-item-tag ${a.cls}">${a.label}</span> ${a.title}</div>
            <div class="announce-item-desc">${a.desc}</div>
            <div class="announce-item-time">${a.time}</div>
        </div>`).join('');
    document.getElementById('announceOverlay').classList.add('show');
}
function hideAnnounce(e){ if(e.target.id === 'announceOverlay') document.getElementById('announceOverlay').classList.remove('show'); }

function showToast(msg){
    const t=document.createElement('div');t.className='toast';t.textContent=msg;
    document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}

function switchTab(tab){
    const p={home:'index.html',chat:'chat.html',plan:'plan.html',profile:'profile.html'};
    if(p[t]) window.location.href=p[t];
}

renderList();
</script>
</body>
</html>

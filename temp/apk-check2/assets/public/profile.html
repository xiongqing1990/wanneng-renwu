<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <title>我的 - 万能任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f0f2f5;
            color: #1d1d1f;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .status-bar {
            height: 44px;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 50px 20px 24px;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 用户信息卡片 */
        .user-card {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff, #e0e0e0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #10b981;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-id {
            font-size: 13px;
            opacity: 0.8;
        }

        .user-level {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 6px;
        }

        .content {
            padding: 16px;
            padding-bottom: 100px;
        }

        /* 收益面板 */
        .earnings-panel {
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .earnings-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .earnings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .earnings-title {
            font-size: 15px;
            opacity: 0.9;
        }

        .withdraw-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .earnings-main {
            text-align: center;
            margin-bottom: 24px;
        }

        .earnings-value {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }

        .earnings-unit {
            font-size: 16px;
            opacity: 0.9;
        }

        .earnings-sub {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .earnings-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            position: relative;
        }

        .earnings-stat {
            text-align: center;
        }

        .earnings-stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .earnings-stat-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* 数据卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #1d1d1f;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        /* 功能菜单 */
        .menu-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .menu-header {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-header::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #10b981;
            border-radius: 2px;
        }

        .menu-list {
            padding: 0 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            background: #fafafa;
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .menu-text {
            flex: 1;
        }

        .menu-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 2px;
        }

        .menu-desc {
            font-size: 12px;
            color: #999;
        }

        .menu-arrow {
            font-size: 20px;
            color: #ccc;
        }

        .menu-badge {
            padding: 2px 8px;
            background: #ff3b30;
            color: white;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        /* 快捷操作 */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px 20px;
        }

        .quick-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 12px 8px;
            border-radius: 12px;
            transition: all 0.2s;
            background: #f9f9f9;
        }

        .quick-item:active {
            transform: scale(0.96);
            background: #f0f0f0;
        }

        .quick-icon {
            font-size: 24px;
        }

        .quick-name {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        /* 任务列表 */
        .task-list {
            padding: 0 20px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 12px;
            color: #999;
        }

        .task-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }

        .task-status.pending {
            background: #fff3e0;
            color: #ff9800;
        }

        .task-status.approved {
            background: #e8f5e9;
            color: #4caf50;
        }

        .task-status.rejected {
            background: #ffebee;
            color: #f44336;
        }

        /* 底部导航 */
        .tab-bar {
            height: 83px;
            background: white;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #999;
            font-size: 11px;
            position: relative;
            padding: 8px 16px;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: #10b981;
        }

        .tab-icon {
            font-size: 24px;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 100% 🔋</span>
    </div>

    <div class="header">
        <div class="header-top">
            <div class="header-title">我的</div>
            <div class="header-actions">
                <button class="header-btn" onclick="showSettings()">⚙️</button>
            </div>
        </div>
        <div class="user-card">
            <div class="user-avatar">我</div>
            <div class="user-info">
                <div class="user-name">万能用户</div>
                <div class="user-id">ID: 100001</div>
                <div class="user-level">🏆 黄金会员</div>
            </div>
        </div>
    </div>

    <div class="content">
        <!-- 收益面板 -->
        <div class="earnings-panel">
            <div class="earnings-header">
                <span class="earnings-title">💰 我的收益</span>
                <button class="withdraw-btn" onclick="withdraw()">立即提现 →</button>
            </div>
            <div class="earnings-main">
                <div class="earnings-value">
                    <span id="totalBalance">0</span>
                    <span class="earnings-unit">元</span>
                </div>
                <div class="earnings-sub">可提现余额</div>
            </div>
            <div class="earnings-stats">
                <div class="earnings-stat">
                    <div class="earnings-stat-value" id="totalEarnings">0</div>
                    <div class="earnings-stat-label">累计收益</div>
                </div>
                <div class="earnings-stat">
                    <div class="earnings-stat-value" id="todayEarnings">0</div>
                    <div class="earnings-stat-label">今日收益</div>
                </div>
                <div class="earnings-stat">
                    <div class="earnings-stat-value" id="pendingEarnings">0</div>
                    <div class="earnings-stat-label">待结算</div>
                </div>
            </div>
        </div>

        <!-- 数据统计 -->
        <div class="stats-grid">
            <div class="stat-card" onclick="goToMyTasks('published')">
                <div class="stat-icon">📝</div>
                <div class="stat-value" id="publishedCount">0</div>
                <div class="stat-label">我发布的</div>
            </div>
            <div class="stat-card" onclick="goToMyTasks('applied')">
                <div class="stat-icon">🤝</div>
                <div class="stat-value" id="appliedCount">0</div>
                <div class="stat-label">我接单的</div>
            </div>
            <div class="stat-card" onclick="goToCollected()">
                <div class="stat-icon">❤️</div>
                <div class="stat-value" id="collectedCount">0</div>
                <div class="stat-label">收藏</div>
            </div>
            <div class="stat-card" onclick="goToHistory()">
                <div class="stat-icon">📜</div>
                <div class="stat-value" id="historyCount">0</div>
                <div class="stat-label">完成</div>
            </div>
        </div>

        <!-- 我的发布 -->
        <div class="menu-card">
            <div class="menu-header">我的发布</div>
            <div class="menu-list" id="publishedList">
                <div class="task-item" style="justify-content: center; color: #999; padding: 20px;">
                    暂无发布的任务
                </div>
            </div>
        </div>

        <!-- 功能菜单 -->
        <div class="menu-card">
            <div class="menu-header">常用功能</div>
            <div class="quick-grid">
                <div class="quick-item" onclick="goToAdmin()">
                    <div class="quick-icon">🏷️</div>
                    <div class="quick-name">分类管理</div>
                </div>
                <div class="quick-item" onclick="goToReview()">
                    <div class="quick-icon">✅</div>
                    <div class="quick-name">任务审核</div>
                </div>
                <div class="quick-item" onclick="goToWallet()">
                    <div class="quick-icon">💳</div>
                    <div class="quick-name">钱包</div>
                </div>
                <div class="quick-item" onclick="goToHelp()">
                    <div class="quick-icon">❓</div>
                    <div class="quick-name">帮助</div>
                </div>
            </div>
        </div>

        <!-- 设置菜单 -->
        <div class="menu-card">
            <div class="menu-header">设置</div>
            <div class="menu-list">
                <div class="menu-item" onclick="goToSettings()">
                    <div class="menu-icon">⚙️</div>
                    <div class="menu-text">
                        <div class="menu-title">账号设置</div>
                        <div class="menu-desc">头像、昵称、密码等</div>
                    </div>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="goToAbout()">
                    <div class="menu-icon">ℹ️</div>
                    <div class="menu-text">
                        <div class="menu-title">关于我们</div>
                        <div class="menu-desc">版本 1.0.0</div>
                    </div>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="clearData()">
                    <div class="menu-icon">🗑️</div>
                    <div class="menu-text">
                        <div class="menu-title">清理缓存</div>
                        <div class="menu-desc">释放存储空间</div>
                    </div>
                    <span class="menu-arrow">›</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item" onclick="switchTab('home')">
            <div class="tab-icon">🏠</div>
            <span>首页</span>
        </div>
        <div class="tab-item" onclick="switchTab('chat')">
            <div class="tab-icon">💬</div>
            <span>聊天</span>
        </div>
        <div class="tab-item" onclick="switchTab('plan')">
            <div class="tab-icon">📋</div>
            <span>计划</span>
        </div>
        <div class="tab-item active" onclick="switchTab('profile')">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        let userStats = {
            totalEarnings: 0,
            todayEarnings: 0,
            pendingEarnings: 0,
            publishedCount: 0,
            appliedCount: 0,
            collectedCount: 0,
            historyCount: 0
        };

        function loadStats() {
            // 从localStorage加载数据
            const userTasks = JSON.parse(localStorage.getItem('userTasks') || '[]');
            const publishedTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            const collectedTasks = JSON.parse(localStorage.getItem('collectedTasks') || '[]');
            const applications = JSON.parse(localStorage.getItem('applications') || '[]');

            // 计算统计数据
            const completedTasks = userTasks.filter(t => t.status === 'completed');
            const today = new Date().toDateString();

            userStats = {
                totalEarnings: completedTasks.reduce((sum, t) => sum + (t.earnings || 0), 0),
                todayEarnings: completedTasks
                    .filter(t => new Date(t.completedTime).toDateString() === today)
                    .reduce((sum, t) => sum + (t.earnings || 0), 0),
                pendingEarnings: userTasks.filter(t => t.status === 'pending').reduce((sum, t) => sum + (t.earnings || 0), 0),
                publishedCount: publishedTasks.length,
                appliedCount: applications.length,
                collectedCount: collectedTasks.length,
                historyCount: completedTasks.length
            };

            // 更新UI
            document.getElementById('totalBalance').textContent = userStats.pendingEarnings;
            document.getElementById('totalEarnings').textContent = userStats.totalEarnings;
            document.getElementById('todayEarnings').textContent = userStats.todayEarnings;
            document.getElementById('pendingEarnings').textContent = userStats.pendingEarnings;
            document.getElementById('publishedCount').textContent = userStats.publishedCount;
            document.getElementById('appliedCount').textContent = userStats.appliedCount;
            document.getElementById('collectedCount').textContent = userStats.collectedCount;
            document.getElementById('historyCount').textContent = userStats.historyCount;
        }

        function renderPublishedTasks() {
            const publishedTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            const list = document.getElementById('publishedList');

            if (publishedTasks.length === 0) {
                list.innerHTML = `
                    <div class="task-item" style="justify-content: center; color: #999; padding: 20px;">
                        暂无发布的任务
                    </div>
                `;
                return;
            }

            list.innerHTML = publishedTasks.slice(0, 3).map(task => `
                <div class="task-item" onclick="viewTask(${task.id})">
                    <div class="task-info">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">¥${task.budget} · ${task.time}</div>
                    </div>
                    <span class="task-status ${task.status || 'pending'}">
                        ${getStatusText(task.status)}
                    </span>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            switch (status) {
                case 'approved': return '已通过';
                case 'rejected': return '已拒绝';
                case 'completed': return '已完成';
                default: return '待审核';
            }
        }

        function viewTask(id) {
            window.location.href = `task-detail.html?id=${id}`;
        }

        function goToMyTasks(type) {
            showNotification(`查看${type === 'published' ? '发布的' : '接单的'}任务`);
        }

        function goToCollected() {
            showNotification('查看收藏列表');
        }

        function goToHistory() {
            showNotification('查看历史记录');
        }

        function goToAdmin() {
            window.location.href = 'admin.html';
        }

        function goToReview() {
            window.location.href = 'review.html';
        }

        function goToWallet() {
            showNotification('钱包功能开发中');
        }

        function goToHelp() {
            showNotification('帮助中心开发中');
        }

        function goToSettings() {
            showNotification('设置页面开发中');
        }

        function goToAbout() {
            showNotification('万能任务 v1.0.0');
        }

        function clearData() {
            if (confirm('确定要清理缓存吗？')) {
                localStorage.clear();
                showNotification('缓存已清理');
                loadStats();
                renderPublishedTasks();
            }
        }

        function withdraw() {
            const balance = parseFloat(document.getElementById('totalBalance').textContent);
            if (balance <= 0) {
                showNotification('暂无可提现余额');
            } else {
                showNotification(`提现 ¥${balance} 功能开发中`);
            }
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const pages = {
                'home': 'index.html',
                'chat': 'chat.html',
                'plan': 'plan.html',
                'profile': 'profile.html'
            };

            if (pages[tab]) {
                window.location.href = pages[tab];
            }
        }

        function showSettings() {
            showNotification('设置页面开发中');
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2000);
        }

        // 初始化
        loadStats();
        renderPublishedTasks();
    </script>
</body>
</html>

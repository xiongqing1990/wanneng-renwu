<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" value="#07C160">
    <title>我的 - 万能任务</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#f5f5f5;color:#1d1d1f;max-width:375px;margin:0 auto;min-height:100vh}

        /* 顶部VIP头部 */
        .vip-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);padding:20px 16px;padding-top:50px;position:relative;overflow:hidden}
        .vip-header::before{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,215,0,.08)}
        .vip-header::after{content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,215,0,.05)}

        .user-row{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
        .avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:600;position:relative;border:2px solid rgba(255,215,0,.5);box-shadow:0 4px 12px rgba(255,215,0,.2)}
        .avatar-vip-tag{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FFD700,#FFA000);color:#7B5800;font-size:8px;font-weight:bold;padding:1px 6px;border-radius:8px;white-space:nowrap;border:1px solid #fff}

        .user-info{flex:1}
        .username{font-size:18px;font-weight:700;color:#fff;margin-bottom:3px;display:flex;align-items:center;gap:6px}
        .vip-name-icon{font-size:13px}
        .user-title{font-size:12px;color:rgba(255,255,255,.55)}

        /* VIP标签栏 */
        .vip-tabs{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
        .vip-tab{padding:6px 14px;border-radius:16px;font-size:11px;color:rgba(255,255,255,.65);background:rgba(255,255,255,.08);cursor:pointer;white-space:nowrap}
        .vip-tab.active{background:linear-gradient(135deg,#FFD700,#FFA000);color:#7B5800;font-weight:600}

        /* 数据统计 */
        .stats{display:flex;background:#fff;margin:0 12px 10px;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .stat-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 0;border-right:.5px solid #f0f0f0}
        .stat-item:last-child{border-right:none}
        .stat-value{font-size:22px;font-weight:700;color:#1d1d1f}
        .stat-label{font-size:11px;color:#999;margin-top:3px}

        /* VIP会员卡片 */
        .vip-card{margin:0 12px 10px;background:linear-gradient(135deg,#FFF8E1 0%,#FFECB3 100%);border-radius:14px;padding:16px;box-shadow:0 3px 12px rgba(255,193,7,.15);border:1px solid rgba(255,193,7,.25)}
        .vip-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .vip-card-left{display:flex;align-items:center;gap:8px}
        .vip-card-icon{font-size:24px}
        .vip-card-title{font-size:16px;font-weight:700;color:#7B5800}
        .vip-card-subtitle{font-size:11px;color:#A1887F}
        .vip-open-btn{background:linear-gradient(135deg,#FFD700,#FFA000);color:#7B5800;border:none;padding:7px 18px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(255,165,0,.35)}
        .vip-benefits{display:flex;gap:8px}
        .benefit-item{flex:1;text-align:center;padding:8px 4px;background:rgba(255,255,255,.6);border-radius:8px}
        .benefit-emoji{font-size:18px;display:block;margin-bottom:3px}
        .benefit-text{font-size:10px;color:#A1887F;font-weight:500}

        /* 菜单列表 */
        .menu-list{background:#fff;margin:0 12px 10px;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
        .menu-section-title{padding:14px 18px 6px;font-size:13px;font-weight:600;color:#999}
        .menu-item{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;transition:background .15s;border-bottom:.5px solid #f5f5f5}
        .menu-item:last-child{border-bottom:none}
        .menu-item:active{background:#f9f9f9}
        .menu-icon{font-size:18px;width:24px;text-align:center}
        .menu-text{flex:1;font-size:15px;color:#1d1d1f}
        .menu-arrow{color:#ccc;font-size:14px}
        .menu-badge{background:#ff3b30;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
        .menu-ver{font-size:12px;color:#bbb;font-weight:400}
        .menu-vip-tag{font-size:10px;background:#FFF8E1;color:#E65100;padding:2px 6px;border-radius:4px;font-weight:600;margin-right:4px}

        /* Tab栏 */
        .tab-bar{height:56px;background:#fff;border-top:.5px solid #e8e8e8;display:flex;justify-content:space-around;align-items:center;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:375px;z-index:100;padding-bottom:0}
        .tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#999;font-size:10px;padding-top:5px}
        .tab-item.active{color:#07C160}
        .tab-icon{font-size:22px;line-height:1}
        .content{padding-bottom:66px}

        .notification{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:#07C160;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:500;z-index:3000;animation:fadeInOut .3s ease-out;white-space:nowrap}
        @keyframes fadeInOut{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    </style>
</head>
<body>

<!-- VIP暗色头部 -->
<div class="vip-header">
    <div class="user-row">
        <div class="avatar">
            我
            <div class="avatar-vip-tag">Lv.5</div>
        </div>
        <div class="user-info">
            <div class="username">万能任务用户 <span class="vip-name-icon">👑</span></div>
            <div class="user-title">全栈开发者 · 精英用户 · 已认证</div>
        </div>
    </div>
    <div class="vip-tabs">
        <div class="vip-tab active">主页</div>
        <div class="vip-tab" onclick="showToast('动态功能开发中')">动态</div>
        <div class="vip-tab" onclick="showToast('收藏功能开发中')">收藏</div>
        <div class="vip-tab" onclick="showToast('关注功能开发中')">关注</div>
    </div>
</div>

<div class="content">

<!-- 统计数据 -->
<div class="stats">
    <div class="stat-item"><div class="stat-value">28</div><div class="stat-label">完成任务</div></div>
    <div class="stat-item"><div class="stat-value">¥52k</div><div class="stat-label">总收益</div></div>
    <div class="stat-item"><div class="stat-value">98%</div><div class="stat-label">好评率</div></div>
    <div class="stat-item"><div class="stat-value">🏆3</div><div class="stat-label">获加精</div></div>
</div>

<!-- VIP会员卡片 -->
<div class="vip-card">
    <div class="vip-card-header">
        <div class="vip-card-left">
            <span class="vip-card-icon">💎</span>
            <div><div class="vip-card-title">开通VIP会员</div><div class="vip-card-subtitle">解锁全部高级权益</div></div>
        </div>
        <button class="vip-open-btn" onclick="openVip()">立即开通</button>
    </div>
    <div class="vip-benefits">
        <div class="benefit-item"><span class="benefit-emoji">⭐</span><span class="benefit-text">加精特权</span></div>
        <div class="benefit-item"><span class="benefit-emoji">📌</span><span class="benefit-text">置顶推广</span></div>
        <div class="benefit-item"><span class="benefit-emoji">🏷️</span><span class="benefit-text">专属标识</span></div>
        <div class="benefit-item"><span class="benefit-emoji">💰</span><span class="benefit-text">免手续费</span></div>
    </div>
</div>

<!-- 功能菜单 -->
<div class="menu-list">
    <div class="menu-item" onclick="showToast('打开我的任务')">
        <div class="menu-icon">📋</div><div class="menu-text">我的任务</div><div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="showToast('打开我的钱包')">
        <div class="menu-icon">💰</div><div class="menu-text">我的钱包</div><div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="showToast('打开我的评价')">
        <div class="menu-icon">⭐</div><div class="menu-text">我的评价</div><div class="menu-arrow">›</div>
    </div>
</div>

<div class="menu-section-title">服务与工具</div>
<div class="menu-list">
    <div class="menu-item" onclick="showToast('打开技能认证')">
        <div class="menu-icon">🎓</div><div class="menu-text">技能认证</div><div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="showJingPanel()">
        <div class="menu-icon">🏆</div><div class="menu-text"><span class="menu-vip-tag">NEW</span>我的加精</div><div class="menu-badge">3</div><div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="showToast('广告中心开发中')">
        <div class="menu-icon">📢</div><div class="menu-text">广告中心</div><div class="menu-vip-tag">VIP</div><div class="menu-arrow">›</div>
    </div>
</div>

<div class="menu-section-title">设置</div>
<div class="menu-list">
    <div class="menu-item" onclick="showToast('打开系统设置')">
        <div class="menu-icon">⚙️</div><div class="menu-text">系统设置</div><div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="showToast('联系客服')">
        <div class="menu-icon">📞</div><div class="menu-text">联系客服</div><div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="checkUpdateFromProfile()" id="update-menu-item">
        <div class="menu-icon">🔄</div>
        <div class="menu-text" style="display:flex;align-items:center;gap:6px">
            检查更新
            <span class="update-dot" id="update-new-dot" style="display:none;background:#ff3b30;width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
        </div>
        <div class="menu-ver" id="profile-version-tag">v4.7</div>
        <div class="menu-arrow update-arrow" id="update-arrow">›</div>
    </div>
</div>

<!-- 版本信息底部 -->
<div style="text-align:center;padding:20px 0 10px;color:#c5c5c5;font-size:12px">
    万能任务APP v<span id="footer-ver">4.7</span> · Build 20260514
</div>

</div><!-- end content -->

<!-- Tab栏 -->
<div class="tab-bar">
    <div class="tab-item" onclick="switchTab('home')"><div class="tab-icon">🏠</div><span>首页</span></div>
    <div class="tab-item" onclick="switchTab('chat')"><div class="tab-icon">💬</div><span>聊天</span></div>
    <div class="tab-item" onclick="switchTab('plan')"><div class="tab-icon">📋</div><span>计划</span></div>
    <div class="tab-item active"><div class="tab-icon">👤</div><span>我的</span></div>
</div>

<script src="app-core.js"></script>
<script src="app-update.js"></script>
<script>
function switchTab(tab){
    const p={home:'index.html',chat:'chat.html',plan:'plan.html',profile:'profile.html'};
    if(p[t]) window.location.href = p[t];
}

function showNotification(message){
    const existing=document.querySelector('.notification');if(existing) existing.remove();
    const n=document.createElement('div');n.className='notification';n.textContent=message;
    document.body.appendChild(n);
    setTimeout(()=>n.remove(),2000);
}
// 兼容旧调用名
var showNotif=showNotification;

function showToast(msg){ showNotification(msg); }

function openVip(){
    var r=confirm('💎 VIP会员权益\n\n⭐ 每月3次免费加精申请\n📌 广告位8折优惠\n🏷️ 专属VIP身份标识\n💰 提现免手续费\n\n\n月卡 ¥19.9/月\n年卡 ¥99/年 (省58%)\n\n是否前往购买？');
    if(r) showToast('跳转支付页面...');
}

function showJingPanel(){
    alert('🏆 我的加精\n\n当前获得 3 次加精：\n\n1. 企业官网设计接单中\n   +曝光 230%\n\n2. 专业小程序开发团队\n   +曝光 185%\n\n3. UI设计作品集展示\n   +曝光 150%\n\n—————\nVIP会员每月可申请3次免费加精\n普通用户每月1次');
}

/* ====== 版本更新入口（从设置页调用）====== */
function checkUpdateFromProfile(){
    var item = document.getElementById('update-menu-item');
    var arrow = document.getElementById('update-arrow');

    // 显示检查中状态
    item.style.pointerEvents = 'none';
    arrow.textContent = '...';
    arrow.style.color = '#07C160';
    showNotification('正在检查更新...');

    // 调用AppUpdater
    if(typeof AppUpdater !== 'undefined'){
        AppUpdater.checkNow();

        // 1.5秒后恢复按钮样式（如果弹窗没出来就提示）
        setTimeout(function(){
            item.style.pointerEvents = '';
            arrow.textContent = '›';
            arrow.style.color = '';
        }, 2000);
    } else {
        // AppUpdater不可用时，手动fetch检测
        fetch('https://api.github.com/repos/xiongqing1990/wanneng-renwu/releases/latest',{
            headers:{'Accept':'application/json'}
        }).then(function(r){return r.json()}).then(function(data){
            var latest = data.tag_name.replace('v','');
            item.style.pointerEvents = '';
            arrow.textContent = '›';

            if(compareVer(latest, '4.7') > 0){
                showNotification('✅ 发现新版本 v' + latest + '！');
                // 显示新版本红点
                document.getElementById('update-new-dot').style.display = 'inline-block';
                document.getElementById('profile-version-tag').textContent = 'v' + latest;
                document.getElementById('profile-version-tag').style.color = '#ff3b30';
                document.getElementById('profile-version-tag').style.fontWeight = '600';

                // 弹出简单确认框
                var r = confirm('🚀 发现新版本 v' + latest + '\n\n' +
                    (data.body || '新版本已发布，快来体验吧！') + '\n\n是否立即下载更新？');
                if(r) {
                    window.location.href = 'https://gh-proxy.com/https://github.com/xiongqing1990/wanneng-renwu/releases/download/v'+latest+'/wanneng-task-v'+latest+'.apk';
                }
            } else {
                showNotification('✅ 已是最新版本 v4.7');
            }
        }).catch(function(err){
            item.style.pointerEvents = '';
            arrow.textContent = '›';
            showNotification('⚠️ 检查失败，请检查网络');
        });
    }
}

function compareVer(v1, v2){
    var a = v1.split('.').map(Number), b = v2.split('.').map(Number);
    for(var i=0;i<Math.max(a.length,b.length);i++){
        var p1=a[i]||0, p2=b[i]||0;
        if(p1>p2) return 1; if(p1<p2) return -1;
    }
    return 0;
}

// CSS动画补丁
var s=document.createElement('style');
s.textContent=`@keyframes fadeInOut{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1}}
.update-arrow{transition:color .2s}
#update-menu-item{transition:background .15s}
.update-dot{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}`;
document.head.appendChild(s);

// 页面加载后静默检查新版本（显示红点提示）
setTimeout(function(){
    fetch('https://api.github.com/repos/xiongqing1990/wanneng-renwu/releases/latest',{
        headers:{'Accept':'application/json'}
    }).then(function(r){return r.json()}).then(function(data){
        var latest = data.tag_name.replace('v','');
        if(compareVer(latest, '4.7') > 0){
            document.getElementById('update-new-dot').style.display = 'inline-block';
            document.getElementById('profile-version-tag').textContent = '最新 v'+latest;
            document.getElementById('profile-version-tag').style.color = '#07C160';
        }
    }).catch(function(){});
}, 3000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 万能任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 375px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            border-color: #007AFF;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-btn:active {
            background: #0051D5;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #eee;
        }
        
        .divider span {
            background: #fff;
            padding: 0 15px;
            position: relative;
            z-index: 1;
            font-size: 14px;
            color: #999;
        }
        
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .signup-link a {
            color: #007AFF;
            text-decoration: none;
            font-weight: 600;
        }
        
        .demo-hint {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📋</div>
            <div class="logo-text">万能任务</div>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">手机号 / 邮箱</label>
                <input type="text" class="form-input" id="username" placeholder="请输入手机号或邮箱" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="login-btn">登录</button>
        </form>
        
        <div class="divider">
            <span>或其他方式登录</span>
        </div>
        
        <div class="social-login">
            <button class="social-btn" onclick="socialLogin('wechat')">💬</button>
            <button class="social-btn" onclick="socialLogin('qq')">🐧</button>
            <button class="social-btn" onclick="socialLogin('weibo')">📱</button>
        </div>
        
        <div class="signup-link">
            还没有账号？<a href="#" onclick="showSignup()">立即注册</a>
        </div>
        
        <div class="demo-hint">
            💡 演示模式：直接点击"登录"按钮即可进入（无需真实账号）
        </div>
    </div>
    
    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 模拟登录成功
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', username || '用户');
            
            showNotification('✅ 登录成功！');
            
            setTimeout(() => {
                const redirect = getQueryParam('redirect');
                window.location.href = redirect || 'index.html';
            }, 1000);
        }
        
        function socialLogin(platform) {
            showNotification(`📱 即将开放：${platform}登录`);
        }
        
        function showSignup() {
            showNotification('📝 注册功能即将开放');
        }
        
        function showNotification(msg) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: #fff;
                padding: 15px 30px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 1000;
            `;
            notification.textContent = msg;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
        
        // 如果已登录，直接跳转
        if (localStorage.getItem('isLoggedIn') === 'true') {
            const redirect = getQueryParam('redirect');
            window.location.href = redirect || 'index.html';
        }
    </script>
</body>
</html>

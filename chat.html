<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <title>聊天 - 万能任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f0f2f5;
            color: #1d1d1f;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 44px;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 16px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            padding: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .header-btn {
            font-size: 20px;
            cursor: pointer;
        }

        /* 搜索栏 */
        .search-bar {
            padding: 12px 16px;
            background: white;
        }

        .search-input-wrap {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 10px 14px;
            gap: 8px;
        }

        .search-input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
        }

        .search-icon {
            color: #999;
            font-size: 16px;
        }

        /* 聊天列表 */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .chat-section-title {
            font-size: 13px;
            color: #999;
            padding: 8px 0;
            font-weight: 500;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: white;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .chat-item:active {
            transform: scale(0.98);
            background: #fafafa;
        }

        .chat-item.unread {
            background: #f0fdf4;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid white;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-tag {
            padding: 2px 6px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 10px;
            color: #666;
            font-weight: 500;
        }

        .chat-time {
            font-size: 12px;
            color: #999;
        }

        .chat-last-msg {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-badge {
            background: #ff3b30;
            color: white;
            font-size: 11px;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            font-weight: 600;
        }

        /* 系统消息 */
        .system-msg {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: linear-gradient(135deg, #fff9e6, #fff3cd);
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid #ffeeba;
        }

        .system-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffc107, #ff9800);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .system-info {
            flex: 1;
        }

        .system-title {
            font-size: 15px;
            font-weight: 600;
            color: #856404;
            margin-bottom: 2px;
        }

        .system-desc {
            font-size: 13px;
            color: #856404;
        }

        /* 底部导航 */
        .tab-bar {
            height: 83px;
            background: white;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #999;
            font-size: 11px;
            position: relative;
            padding: 8px 16px;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: #10b981;
        }

        .tab-icon {
            font-size: 24px;
        }

        .tab-badge {
            position: absolute;
            top: 4px;
            right: 10px;
            width: 8px;
            height: 8px;
            background: #ff3b30;
            border-radius: 50%;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 100% 🔋</span>
    </div>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">💬 消息</div>
        <div class="header-actions">
            <span class="header-btn" onclick="showNotification('搜索消息')">🔍</span>
        </div>
    </div>

    <div class="search-bar">
        <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜索聊天记录..." id="searchInput">
        </div>
    </div>

    <div class="chat-list" id="chatList"></div>

    <div class="tab-bar">
        <div class="tab-item" onclick="switchTab('home')">
            <div class="tab-icon">🏠</div>
            <span>首页</span>
        </div>
        <div class="tab-item active">
            <div class="tab-icon">💬</div>
            <span>聊天</span>
            <div class="tab-badge"></div>
        </div>
        <div class="tab-item" onclick="switchTab('plan')">
            <div class="tab-icon">📋</div>
            <span>计划</span>
        </div>
        <div class="tab-item" onclick="switchTab('profile')">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </div>
    </div>

    <script>
        let chats = [
            {
                id: 1,
                name: "张明",
                tag: "发布者",
                lastMsg: "你好，设计需求文档已发送，请查收",
                time: "10:30",
                unread: 2,
                avatar: "张",
                color: "linear-gradient(135deg, #667eea, #764ba2)",
                online: true
            },
            {
                id: 2,
                name: "李伟",
                tag: "开发者",
                lastMsg: "小程序商城开发完成80%，预计明天交付",
                time: "09:15",
                unread: 1,
                avatar: "李",
                color: "linear-gradient(135deg, #f093fb, #f5576c)",
                online: true
            },
            {
                id: 3,
                name: "王芳",
                tag: "客户",
                lastMsg: "文案已收到，质量很好，付款已转",
                time: "昨天",
                unread: 0,
                avatar: "王",
                color: "linear-gradient(135deg, #4facfe, #00f2fe)",
                online: false
            },
            {
                id: 4,
                name: "系统通知",
                tag: "",
                lastMsg: "🎉 恭喜！您有1个任务即将到期，请及时处理",
                time: "昨天",
                unread: 1,
                avatar: "🔔",
                color: "linear-gradient(135deg, #43e97b, #38f9d7)",
                online: false,
                isSystem: true
            }
        ];

        function renderChats() {
            const chatList = document.getElementById('chatList');

            // 系统消息
            const systemMsg = chats.find(c => c.isSystem);
            let html = '';

            if (systemMsg) {
                html += `
                    <div class="system-msg" onclick="openChat(${systemMsg.id})">
                        <div class="system-icon">${systemMsg.avatar}</div>
                        <div class="system-info">
                            <div class="system-title">${systemMsg.name}</div>
                            <div class="system-desc">${systemMsg.lastMsg}</div>
                        </div>
                        <span class="chat-time">${systemMsg.time}</span>
                    </div>
                `;
            }

            // 普通消息
            html += '<div class="chat-section-title">私信消息</div>';

            const privateChats = chats.filter(c => !c.isSystem);
            if (privateChats.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div class="empty-title">暂无聊天记录</div>
                        <div class="empty-desc">开始接单或发布任务，与对方沟通吧</div>
                    </div>
                `;
            } else {
                html += privateChats.map(chat => `
                    <div class="chat-item ${chat.unread > 0 ? 'unread' : ''}" onclick="openChat(${chat.id})">
                        <div class="chat-avatar" style="background: ${chat.color};">
                            ${chat.avatar}
                            ${chat.online ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div class="chat-info">
                            <div class="chat-top">
                                <div class="chat-name">
                                    ${chat.name}
                                    ${chat.tag ? `<span class="chat-tag">${chat.tag}</span>` : ''}
                                </div>
                                <span class="chat-time">${chat.time}</span>
                            </div>
                            <div class="chat-last-msg">
                                ${chat.lastMsg}
                                ${chat.unread > 0 ? `<span class="chat-badge">${chat.unread}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            chatList.innerHTML = html;
        }

        function openChat(id) {
            window.location.href = `chat-detail.html?id=${id}`;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function switchTab(tab) {
            const pages = {
                'home': 'index.html',
                'chat': 'chat.html',
                'plan': 'plan.html',
                'profile': 'profile.html'
            };
            if (pages[tab]) {
                window.location.href = pages[tab];
            }
        }

        function showNotification(message) {
            alert(message);
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            if (keyword) {
                // 简单过滤演示
                chats = chats.filter(c =>
                    c.name.toLowerCase().includes(keyword) ||
                    c.lastMsg.toLowerCase().includes(keyword)
                );
            } else {
                // 重置
                chats = [
                    { id: 1, name: "张明", tag: "发布者", lastMsg: "你好，设计需求文档已发送，请查收", time: "10:30", unread: 2, avatar: "张", color: "linear-gradient(135deg, #667eea, #764ba2)", online: true },
                    { id: 2, name: "李伟", tag: "开发者", lastMsg: "小程序商城开发完成80%，预计明天交付", time: "09:15", unread: 1, avatar: "李", color: "linear-gradient(135deg, #f093fb, #f5576c)", online: true },
                    { id: 3, name: "王芳", tag: "客户", lastMsg: "文案已收到，质量很好，付款已转", time: "昨天", unread: 0, avatar: "王", color: "linear-gradient(135deg, #4facfe, #00f2fe)", online: false },
                    { id: 4, name: "系统通知", tag: "", lastMsg: "🎉 恭喜！您有1个任务即将到期，请及时处理", time: "昨天", unread: 1, avatar: "🔔", color: "linear-gradient(135deg, #43e97b, #38f9d7)", online: false, isSystem: true }
                ];
            }
            renderChats();
        });

        renderChats();
    </script>
</body>
</html>

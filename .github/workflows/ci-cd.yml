# GitHub Actions CI/CD 配置
# 自动化构建、测试、部署

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  # 单元测试
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: npm ci
      - run: npm run test:unit
      - name: 上传测试报告
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: tests/results/

  # 构建（多端）
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [h5, mp-weixin, app-android, app-ios]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: npm ci
      - name: 构建 ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.platform }}
          path: dist/

  # 部署到测试环境
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 部署到测试环境
        run: |
          echo "部署到测试环境"
          # 实际部署脚本

  # 部署到生产环境
  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 部署到生产环境
        run: |
          echo "部署到生产环境"
          # 实际部署脚本

  # 性能测试
  performance:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 运行Lighthouse
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://staging.wanengrenwu.com/
            https://staging.wanengrenwu.com/tasks
          uploadArtifacts: true

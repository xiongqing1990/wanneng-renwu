<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007AFF">
    <title>发布任务 - 万能任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .status-bar {
            height: 44px;
            background: #007AFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: #007AFF;
            color: white;
            padding: 12px 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            padding: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .form-container {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #007AFF;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background: white;
            cursor: pointer;
        }

        .ai-suggest {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .ai-suggest-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-suggest-text {
            font-size: 13px;
            line-height: 1.5;
            opacity: 0.95;
        }

        .btn-publish {
            width: 100%;
            padding: 16px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-publish:active {
            background: #0051D5;
        }

        .btn-auto {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }

        .btn-auto:active {
            transform: scale(0.98);
        }

        .notification {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #34c759;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 3000;
            animation: slideDown 0.3s ease-out;
            white-space: nowrap;
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 100% 🔋</span>
    </div>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">📝 发布任务</div>
    </div>

    <div class="form-container">
        <div class="ai-suggest">
            <div class="ai-suggest-title">
                🤖 智能建议
            </div>
            <div class="ai-suggest-text" id="aiSuggest">
                根据历史数据，建议预算设为 ¥1500-2500，更容易被接单
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">任务标题</label>
            <input type="text" class="form-input" id="taskTitle" placeholder="简要描述任务">
        </div>

        <div class="form-group">
            <label class="form-label">任务分类</label>
            <select class="form-select" id="taskCategory" onchange="updateSuggest()">
                <option value="设计">设计</option>
                <option value="开发">开发</option>
                <option value="文案">文案</option>
                <option value="翻译">翻译</option>
                <option value="视频">视频</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">任务描述</label>
            <textarea class="form-input form-textarea" id="taskDesc" placeholder="详细描述任务需求..."></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">预算（元）</label>
            <input type="number" class="form-input" id="taskBudget" placeholder="设置任务预算" oninput="updateSuggest()">
        </div>

        <div class="form-group">
            <label class="form-label">截止时间</label>
            <input type="date" class="form-input" id="taskDeadline">
        </div>

        <button class="btn-publish" onclick="publishTask()">发布任务</button>
        <button class="btn-auto" onclick="autoPublish()">🤖 智能发布（自动填写）</button>
    </div>

    <script>
        const suggestData = {
            '设计': { min: 1000, max: 3000, suggest: '设计类任务建议预算 ¥1000-3000，包含源文件交付' },
            '开发': { min: 5000, max: 15000, suggest: '开发类任务建议预算 ¥5000-15000，根据功能复杂度调整' },
            '文案': { min: 300, max: 1000, suggest: '文案类任务建议预算 ¥300-1000，根据字数和难度调整' },
            '翻译': { min: 500, max: 1500, suggest: '翻译类任务建议预算 ¥500-1500，根据字数和语种调整' },
            '视频': { min: 2000, max: 8000, suggest: '视频类任务建议预算 ¥2000-8000，根据时长和质量要求调整' },
            '其他': { min: 500, max: 2000, suggest: '建议先发布，根据接单者报价调整预算' }
        };

        function updateSuggest() {
            const category = document.getElementById('taskCategory').value;
            const budget = document.getElementById('taskBudget').value;
            const suggest = suggestData[category];
            
            let text = suggest.suggest;
            
            if (budget && (parseInt(budget) < suggest.min || parseInt(budget) > suggest.max)) {
                text += `。当前预算不在推荐范围 ¥${suggest.min}-${suggest.max}，可能影响接单速度`;
            }
            
            document.getElementById('aiSuggest').textContent = text;
        }

        function publishTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const category = document.getElementById('taskCategory').value;
            const desc = document.getElementById('taskDesc').value.trim();
            const budget = document.getElementById('taskBudget').value;

            if (!title || !desc || !budget) {
                showNotification('请填写完整信息', 'warning');
                return;
            }

            showNotification('✅ 任务发布成功！');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        function autoPublish() {
            // 自动填写示例数据
            const categories = ['设计', '开发', '文案', '翻译'];
            const randomCategory = categories[Math.floor(Math.random() * categories.length)];
            const suggest = suggestData[randomCategory];
            const randomBudget = Math.floor(Math.random() * (suggest.max - suggest.min)) + suggest.min;

            document.getElementById('taskCategory').value = randomCategory;
            document.getElementById('taskTitle').value = `需要${randomCategory}师完成项目`;
            document.getElementById('taskDesc').value = `详细描述${randomCategory}需求，包括风格、尺寸、交付物等`;
            document.getElementById('taskBudget').value = randomBudget;
            
            updateSuggest();
            showNotification('🤖 已自动填写示例数据');
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function showNotification(message, type = 'success') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.background = type === 'warning' ? '#ff9500' : '#34c759';

            document.body.appendChild(notification);

            setTimeout(() => notification.remove(), 2000);
        }

        // 初始化建议
        updateSuggest();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布任务 - 万能任务</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#f5f5f5;color:#1d1d1f;max-width:375px;margin:0 auto;min-height:100vh}
        
        .header{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;padding-top:50px;position:sticky;top:0;z-index:100}
        .back-btn{font-size:28px;color:#07C160;cursor:pointer;background:none;border:none;font-weight:300;padding:0}
        .header-title{font-size:17px;font-weight:600}
        
        /* 模式切换 */
        .mode-switch{display:flex;background:#fff;margin:12px;border-radius:14px;padding:4px;box-shadow:0 2rpx 8px rgba(0,0,0,.04)}
        .mode-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0;border-radius:12px;font-size:14px;color:#666;cursor:pointer;transition:all .3s;border:none;background:transparent}
        .mode-btn.active{background:#07C160;color:#fff;font-weight:500;box-shadow:0 3px 10px rgba(7,193,96,.25)}
        .mode-icon{font-size:18px}

        .form-container{padding:12px;padding-bottom:140px}
        .form-group{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
        .form-group.highlight{border-left:5px solid #07C160}
        
        .section-label{font-size:15px;font-weight:600;color:#1d1d1f;display:block;margin-bottom:14px}
        .form-label{font-size:13px;color:#666;margin-bottom:8px;display:block;font-weight:500}
        .optional{font-size:11px;color:#999;margin-left:auto}
        
        .form-input{width:100%;padding:12px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:15px;outline:none;transition:border-color .3s}
        .form-input:focus{border-color:#07C160}
        .form-textarea{min-height:100px;resize:vertical}
        
        /* 任务类型卡片 */
        .type-cards{display:flex;gap:12px}
        .type-card{flex:1;padding:16px 12px;border-radius:13px;border:2px solid #eee;text-align:center;cursor:pointer;transition:all .3s}
        .type-card.active{border-color:#07C160;background:#e8f5e9}
        .type-icon{font-size:28px;display:block;margin-bottom:6px}
        .type-name{font-size:14px;font-weight:600;color:#333;display:block;margin-bottom:4px}
        .type-desc{font-size:11px;color:#999}
        .type-card.active .type-name{color:#07C160}

        /* 预算快捷输入 */
        .budget-inline{display:flex;align-items:center;margin-bottom:10px}
        .budget-num{width:130px;padding:12px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:20px;font-weight:bold;text-align:center;outline:none}
        .yuan{font-size:15px;color:#666;margin-left:6px}
        .quick-budget-tags{display:flex;gap:8px;flex-wrap:wrap}
        .qb-tag{padding:7px 20px;border-radius:18px;font-size:13px;color:#333;background:#f5f5f5;border:1.5px solid transparent;cursor:pointer;transition:all .3s}
        .qb-tag.active{background:#e8f5e9;color:#07C160;border-color:#07C160}
        
        /* 分类横向滚动 */
        .cat-scroll{white-space:nowrap;overflow-x:auto;margin-top:8px;-webkit-overflow-scrolling:touch}
        .cat-scroll::-webkit-scrollbar{display:none}
        .cat-pill{display:inline-block;padding:8px 18px;border-radius:18px;font-size:13px;color:#666;background:#f5f5f5;margin-right:8px;cursor:pointer;transition:all .3s}
        .cat-pill.active{background:#07C160;color:#fff}

        /* 广告位区域 */
        .ad-section{border-left:5px solid #ffd700;cursor:pointer}
        .ad-header{display:flex;justify-content:space-between;align-items:center}
        .ad-title{font-size:14px;font-weight:500;color:#1d1d1f}
        .expand-icon{font-size:12px;color:#999}
        .ad-option{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5}
        .ad-radio{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;margin-right:12px;flex-shrink:0;transition:all .3s}
        .ad-radio.checked{background:#ffd700;border-color:#ffd700}
        .ad-info{flex:1;display:flex;justify-content:space-between;align-items:center}
        .ad-name{font-size:14px;font-weight:500}
        .ad-price{font-size:13px;color:#ff9800;font-weight:bold}
        .free-ad-tip{display:flex;align-items:center;gap:8px;padding:12px;background:#fff8e1;border-radius:10px;margin-top:10px}
        .tip-icon{font-size:20px}
        .tip-text{font-size:12px;color:#666}
        .highlight-green{color:#07C160;font-weight:bold}

        .toggle-more{text-align:center;padding:16px;color:#07C160;font-size:13px;cursor:pointer}

        .footer{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:14px 16px;padding-bottom:24px;box-shadow:0 -3px 12px rgba(0,0,0,.06);z-index:99}
        .btn-publish{width:100%;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;padding:16px;border-radius:30px;font-size:16px;font-weight:bold;border:none;box-shadow:0 4px 16px rgba(7,193,96,.3);cursor:pointer}
        .btn-publish:active{transform:scale(.97)}
        
        .notification{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#07C160;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:3000;animation:slideDown .3s ease-out}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div class="header-title">发布任务</div>
</div>

<div class="mode-switch">
    <button class="mode-btn" id="modeFull" onclick="setMode('full')">📝 完整发布</button>
    <button class="mode-btn active" id="modeQuick" onclick="setMode('quick')">⚡ 快捷发布</button>
</div>

<div class="form-container" id="formContainer"></div>

<div class="footer">
    <button class="btn-publish" onclick="doPublish()" id="publishBtn">⚡ 快捷发布</button>
</div>

<script>
let quickMode = true;
let showAd = false;
let selectedAdPos = '';
const categories = [
    {id:'ticket',name:'🎫 票券'},{id:'dining',name:'🍔 餐饮'},{id:'secondhand',name:'📱 二手'},
    {id:'life',name:'🏠 生活'},{id:'shopping',name:'🛒 代购'},{id:'transport',name:'🏃 跑腿'},
    {id:'game',name:'🎮 游戏'}
];

function setMode(mode){
    quickMode = (mode==='quick');
    document.getElementById('modeFull').classList.toggle('active',!quickMode);
    document.getElementById('modeQuick').classList.toggle('active',quickMode);
    document.getElementById('publishBtn').textContent = quickMode ? '⚡ 快捷发布' : '📝 发布任务';
    renderForm();
}

function renderForm(){
    let html = '';
    
    if(quickMode){
        // ===== 快捷模式 =====
        html += `<div class="form-group highlight">
            <span class="section-label">🎯 选择任务类型</span>
            <div class="type-cards">
                <div class="type-card active" id="tcShort" onclick="selectType('short')"><div class="type-icon">⚡</div><div class="type-name">短期任务</div><div class="type-desc">一人接取即下架</div></div>
                <div class="type-card" id="tcLong" onclick="selectType('long')"><div class="type-icon">📅</div><div class="type-name">长期任务</div><div class="type-desc">多人可接取长期有效</div></div>
            </div></div>`;

        html += `<div class="form-group">
            <input type="text" class="form-input" id="title" placeholder="一句话说明需求（如：求购电影票2张）" maxlength="50">
            <small style="color:#ccc;font-size:11px;display:block;text-align:right;margin-top:4px"><span id="titleCount">0</span>/50</small></div>`;

        html += `<div class="form-group">
            <label class="form-label">💰 预算</label>
            <div class="budget-inline"><input type="number" class="budget-num" id="budget" placeholder="金额"><span class="yuan">元</span></div>
            <div class="quick-budget-tags">${[5,10,20,50,100].map(v=>`<span class="qb-tag" onclick="setBudget(${v})">${v}</span>`).join('')}</div></div>`;

        html += `<div class="form-group">
            <label class="form-label">📂 分类</label>
            <div class="cat-scroll">${categories.map(c=>`<span class="cat-pill" onclick="selectCat(this,'${c.id}')">${c.name}</span>`).join('')}</div></div>`;

        // 广告位
        html += `<div class="form-group ad-section" onclick="toggleAd()">
            <div class="ad-header"><span class="ad-title">📢 购买广告位 <small style="color:#999">(选填)</small></span><span class="expand-icon" id="adExpandIcon">▼</span></div>
            <div id="adOptions" style="display:none">
                <div class="ad-option" onclick="selectAd('top_pinned')"><div class="ad-radio" id="radio_top"></div><div class="ad-info"><span class="ad-name">📌 置顶推广</span><span class="ad-price">¥5/小时</span></div></div>
                <div class="ad-option" onclick="selectAd('recommend')"><div class="ad-radio" id="radio_rec"></div><div class="ad-info"><span class="ad-name">🔥 热门推荐</span><span class="ad-price">¥3/小时</span></div></div>
                <div class="free-ad-tip"><span class="tip-icon">🎁</span><span class="tip-text">您当前有 <span class="highlight-green">1</span> 次免费广告位可用！</span></div>
            </div></div>`;

        // 更多选项
        html += `<div class="toggle-more" onclick="document.getElementById('moreOpts').style.display=document.getElementById('moreOpts').style.display==='block'?'none':'block'">展开更多选项 ▼</div>`;
        html += `<div id="moreOpts" style="display:none">
            <div class="form-group"><label class="form-label">📝 详细描述（选填）</label><textarea class="form-input form-textarea" id="desc" placeholder="补充时间、地点、要求等..." maxlength="500"></textarea></div>
            <div class="form-group"><label class="form-label">📍 位置（选填）</label><input type="text" class="form-input" id="location" placeholder="点击选择或手动输入"></textarea></div>
        </div>`;
    }else{
        // ===== 完整模式 =====
        html += `<div class="form-group"><label class="form-label">✚ 标题 <span class="optional">*</span></label><input type="text" class="form-input" id="title" placeholder="简要描述你的需求" maxlength="50"></div>`;
        
        html += `<div class="form-group highlight"><span class="section-label">🎯 任务类型</span>
            <div style="display:flex;gap:10px">
                <div style="flex:1;padding:14px;border-radius:12px;border:2px solid #eee;text-align:center;cursor:pointer" id="fcShort" onclick="selectTypeF('short')"><b>⚡ 短期任务</b> — 一人接取即下架</div>
                <div style="flex:1;padding:14px;border-radius:12px;border:2px solid #eee;text-align:center;cursor:pointer" id="fcLong" onclick="selectTypeF('long')"><b>📅 长期任务</b> — 多人可接取</div>
            </div></div>`;

        html += `<div class="form-group"><label class="form-label">✚ 详细描述 <span class="optional">*</span></label><textarea class="form-input form-textarea" id="desc" placeholder="详细说明需求，包括时间、地点、具体要求等" maxlength="500"></textarea></div>`;
        
        html += `<div class="form-group"><label class="form-label">📂 分类</label>
            <div style="display:flex;flex-wrap:wrap;gap:10px">${categories.map(c=>`<span class="cat-pill" onclick="selectCat(this,'${c.id}')">${c.name}</span>`).join('')}</div></div>`;

        html += `<div class="form-group"><label class="form-label">💰 预算(元) <span class="optional">*</span></label><input type="number" class="form-input" id="budget" placeholder="输入金额"></div>`;

        // 广告位
        html += `<div class="form-group ad-section" onclick="toggleAd()">
            <div class="ad-header"><span class="ad-title">📢 推广加持 <span class="optional">(选填)</span></span><span class="expand-icon" id="adExpandIcon">▼</span></div>
            <div id="adOptions" style="display:none">
                <div class="ad-option" onclick="selectAd('top_pinned')"><div class="ad-radio" id="radio_top"></div><div class="ad-info"><span class="ad-name">📌 置顶推广</span><span class="ad-price">¥5/时</span></div></div>
                <div class="ad-option" onclick="selectAd('recommend')"><div class="ad-radio" id="radio_rec"></div><div class="ad-info"><span class="ad-name">🔥 热门推荐</span><span class="ad-price">¥3/时</span></div></div>
                <div class="ad-option" onclick="selectAd('home_banner')"><div class="ad-radio" id="radio_banner"></div><div class="ad-info"><span class="ad-name">🎯 首页Banner</span><span class="ad-price">¥10/天</span></div></div>
                <div class="free-ad-tip"><span class="tip-icon">🎁</span><span class="tip-text">当前有 <span class="highlight-green">1</span> 次免费广告位！</span></div>
            </div></div>`;
    }

    document.getElementById('formContainer').innerHTML = html;

    // 字数统计
    const titleInput = document.getElementById('title');
    if(titleInput) titleInput.addEventListener('input', function(){
        document.getElementById('titleCount').textContent=this.value.length;
    });
}

// 当前选择的类型和分类
let curType='short';
let curCat='ticket';

function selectType(t){
    curType=t;
    document.querySelectorAll('#tcShort,#tcLong').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('#fcShort,#fcLong').forEach(el=>el.style.borderColor='#eee');
    if(t==='short'){document.getElementById('tcShort')&&document.getElementById('tcShort').classList.add('active');document.getElementById('fcShort')&&(document.getElementById('fcShort').style.borderColor='#07C160')}
    else{document.getElementById('tcLong')&&document.getElementById('tcLong').classList.add('active');document.getElementById('fcLong')&&(document.getElementById('fcLong').style.borderColor='#07C160')}
}
function selectTypeF(t){selectType(t)}
function setBudget(v){document.getElementById('budget').value=v;document.querySelectorAll('.qb-tag').forEach(el=>el.classList.remove('active'));event.target.classList.add('active')}
function selectCat(el,id){curCat=id;el.parentElement.querySelectorAll('.cat-pill').forEach(e=>e.classList.remove('active'));el.classList.add('active')}
function toggleAd(){showAd=!showAd;document.getElementById('adOptions').style.display=showAd?'block':'none';document.getElementById('adExpandIcon').textContent=showAd?'▲':'▼'}
function selectAd(pos){selectedAdPos=(selectedAdPos===pos)?'':pos;['top','rec','banner'].forEach(p=>{
    const r=document.getElementById('radio_'+p);if(r)r.className='ad-radio'+((selectedAdPos===p||pos.replace('_pinned',''))?' checked':'')
})}

function doPublish(){
    const title=document.getElementById('title').value.trim();
    const budget=document.getElementById('budget').value;
    if(!title){showNotif('请输入标题');return}
    if(!budget||Number(budget)<1){showNotif('请填写预算');return}

    showNotif('✅ 发布成功！');
    setTimeout(()=>{window.location.href='index.html'},1200);
}

function showNotif(msg){
    const n=document.createElement('div');n.className='notification';n.textContent=msg;document.body.appendChild(n);
    setTimeout(()=>n.remove(),2000);
}

// 初始化
renderForm();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007AFF">
    <title>聊天详情 - 万能任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            max-width: 375px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 44px;
            background: #007AFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: #007AFF;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            padding: 0;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .header-info {
            flex: 1;
        }

        .header-name {
            font-size: 16px;
            font-weight: 600;
        }

        .header-status {
            font-size: 12px;
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }

        .header-actions span {
            cursor: pointer;
        }

        .view-task-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f5f7;
        }

        .chat-date {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin: 12px 0;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message.sent {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: 600;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.sent .msg-bubble {
            background: #007AFF;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .msg-bubble {
            background: white;
            color: #1d1d1f;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .msg-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: center;
        }

        .msg-status {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .message.sent .msg-status {
            text-align: right;
        }

        .chat-input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .input-action {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: #007AFF;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #007AFF;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 100% 🔋</span>
    </div>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="chat-avatar" id="chatAvatar">张</div>
        <div class="header-info">
            <div class="header-name" id="chatName">张*（发布者）</div>
            <div class="header-status">在线 · 正在输入...</div>
        </div>
        <div class="header-actions">
            <button class="view-task-btn" onclick="viewTask()">查看任务</button>
            <span onclick="showNotification('语音通话')">📞</span>
            <span onclick="showNotification('视频通话')">📹</span>
        </div>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="chat-date">今天 09:30</div>
        
        <div class="message received">
            <div class="msg-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">张</div>
            <div>
                <div class="msg-bubble">你好，我对你的设计能力很感兴趣，想聊聊项目细节</div>
                <div class="msg-time">09:30</div>
            </div>
        </div>

        <div class="message sent">
            <div>
                <div class="msg-bubble">好的，请问有什么具体需求？</div>
                <div class="msg-status">已读</div>
            </div>
            <div class="msg-avatar" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">我</div>
        </div>

        <div class="message received">
            <div class="msg-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">张</div>
            <div>
                <div class="msg-bubble">需要设计一个企业官网首页，风格要简洁大气，符合企业级标准</div>
                <div class="msg-time">09:32</div>
            </div>
        </div>

        <div class="message sent">
            <div>
                <div class="msg-bubble">明白了，我可以帮你设计。有参考网站吗？</div>
                <div class="msg-status">已读</div>
            </div>
            <div class="msg-avatar" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">我</div>
        </div>

        <div class="message received">
            <div class="msg-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">张</div>
            <div>
                <div class="msg-bubble">有的，我发你参考链接。另外，预算可以谈到2500，你觉得怎么样？</div>
                <div class="msg-time">09:35</div>
            </div>
        </div>

        <div class="message sent">
            <div>
                <div class="msg-bubble">2500可以接受，我可以先出初稿给你看</div>
                <div class="msg-status">已送达</div>
            </div>
            <div class="msg-avatar" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">我</div>
        </div>
    </div>

    <div class="chat-input-area">
        <button class="input-action" onclick="showNotification('添加附件')">📎</button>
        <input type="text" class="chat-input" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

    <script>
        function init() {
            // 滚动到底部
            const chatBody = document.getElementById('chatBody');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;

            const chatBody = document.getElementById('chatBody');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message sent';
            msgDiv.innerHTML = `
                <div>
                    <div class="msg-bubble">${text}</div>
                    <div class="msg-status">已发送</div>
                </div>
                <div class="msg-avatar" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">我</div>
            `;
            
            chatBody.appendChild(msgDiv);
            input.value = '';
            
            // 滚动到底部
            chatBody.scrollTop = chatBody.scrollHeight;

            // 模拟对方回复
            setTimeout(() => {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'message received';
                replyDiv.innerHTML = `
                    <div class="msg-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">张</div>
                    <div>
                        <div class="msg-bubble">收到，谢谢！</div>
                        <div class="msg-time">${getCurrentTime()}</div>
                    </div>
                `;
                chatBody.appendChild(replyDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
            }, 1000);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function getCurrentTime() {
            const now = new Date();
            return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }

        function goBack() {
            window.location.href = 'chat.html';
        }

        function viewTask() {
            // 模拟获取当前聊天关联的任务ID
            const taskId = 1;
            window.location.href = `task-detail.html?id=${taskId}`;
        }

        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 60px;
                left: 50%;
                transform: translateX(-50%);
                background: #34c759;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                z-index: 3000;
            `;
            document.body.appendChild(notification);

            setTimeout(() => notification.remove(), 2000);
        }

        init();
    </script>
</body>
</html>

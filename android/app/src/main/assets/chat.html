<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007AFF">
    <title>聊天 - 万能任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            max-width: 375px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 44px;
            background: #007AFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: #007AFF;
            color: white;
            padding: 12px 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            padding: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-item:active {
            transform: scale(0.98);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last-msg {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .chat-time {
            font-size: 12px;
            color: #999;
        }

        .chat-badge {
            background: #ff3b30;
            color: white;
            font-size: 11px;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        .tab-bar {
            height: 83px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #999;
            font-size: 12px;
        }

        .tab-item.active {
            color: #007AFF;
        }

        .tab-icon {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 100% 🔋</span>
    </div>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">💬 消息</div>
    </div>

    <div class="chat-list" id="chatList"></div>

    <div class="tab-bar">
        <div class="tab-item" onclick="switchTab('home')">
            <div class="tab-icon">🏠</div>
            <span>首页</span>
        </div>
        <div class="tab-item active">
            <div class="tab-icon">💬</div>
            <span>聊天</span>
        </div>
        <div class="tab-item" onclick="switchTab('plan')">
            <div class="tab-icon">📋</div>
            <span>计划</span>
        </div>
        <div class="tab-item" onclick="switchTab('profile')">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </div>
    </div>

    <script>
        let chats = [
            {
                id: 1,
                name: "张*（发布者）",
                lastMsg: "你好，设计需求文档已发送，请查收",
                time: "10:30",
                unread: 2,
                avatar: "张",
                color: "linear-gradient(135deg, #667eea, #764ba2)"
            },
            {
                id: 2,
                name: "李*（开发者）",
                lastMsg: "小程序商城开发完成80%，预计明天交付",
                time: "09:15",
                unread: 1,
                avatar: "李",
                color: "linear-gradient(135deg, #f093fb, #f5576c)"
            },
            {
                id: 3,
                name: "王*（客户）",
                lastMsg: "文案已收到，质量很好，付款已转",
                time: "昨天",
                unread: 0,
                avatar: "王",
                color: "linear-gradient(135deg, #4facfe, #00f2fe)"
            },
            {
                id: 4,
                name: "系统通知",
                lastMsg: "🎉 恭喜！您有1个任务即将到期，请及时处理",
                time: "昨天",
                unread: 1,
                avatar: "🔔",
                color: "linear-gradient(135deg, #43e97b, #38f9d7)"
            }
        ];

        function init() {
            renderChats();
        }

        function renderChats() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = '';
            chats.forEach(chat => {
                const chatElement = createChatElement(chat);
                chatList.appendChild(chatElement);
            });
        }

        function createChatElement(chat) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.onclick = () => openChat(chat.id);
            div.innerHTML = `
                <div class="chat-avatar" style="background: ${chat.color};">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${chat.name}</div>
                    <div class="chat-last-msg">${chat.lastMsg}</div>
                </div>
                <div class="chat-meta">
                    <div class="chat-time">${chat.time}</div>
                    ${chat.unread > 0 ? `<div class="chat-badge">${chat.unread}</div>` : ''}
                </div>
            `;
            return div;
        }

        function openChat(id) {
            window.location.href = `chat-detail.html?id=${id}`;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function switchTab(tab) {
            const pages = {
                'home': 'index.html',
                'chat': 'chat.html',
                'plan': 'plan.html',
                'profile': 'profile.html'
            };
            if (pages[tab]) {
                window.location.href = pages[tab];
            }
        }

        init();
    </script>
</body>
</html>

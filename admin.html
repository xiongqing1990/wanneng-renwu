<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007AFF">
    <title>分类管理 - 万能任务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f5f5f7;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .status-bar {
            height: 44px;
            background: #007AFF;
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 375px;
            z-index: 1000;
        }
        .status-bar .back {
            font-size: 16px;
            cursor: pointer;
            margin-right: 12px;
        }
        .header {
            background: #007AFF;
            color: white;
            padding: 60px 20px 20px;
        }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }

        .content { padding: 20px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-list { display: flex; flex-direction: column; gap: 10px; }
        .category-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f8f8fa;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .category-item:hover { background: #f0f0f5; }
        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }
        .category-info { flex: 1; }
        .category-name { font-size: 15px; font-weight: 500; color: #1d1d1f; }
        .category-count { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .category-actions { display: flex; gap: 8px; }
        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: #e8f4fd; color: #007AFF; }
        .btn-delete { background: #fee; color: #ff3b30; }

        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .add-form input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-form input:focus { border-color: #007AFF; }
        .btn-add {
            padding: 12px 20px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-add:active { background: #0056b3; }

        .edit-form {
            background: #fff8f0;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }
        .edit-form.active { display: block; }
        .edit-form h3 { font-size: 15px; margin-bottom: 12px; color: #ff9500; }
        .edit-form input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
        }
        .edit-actions { display: flex; gap: 10px; }
        .btn-save {
            flex: 1;
            padding: 12px;
            background: #34c759;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #8e8e93;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #8e8e93;
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 375px;
            background: white;
            border-top: 1px solid #e5e5ea;
            display: flex;
            padding: 8px 0 20px;
            z-index: 100;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            color: #8e8e93;
            font-size: 10px;
        }
        .tab-item.active { color: #007AFF; }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }

        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .default-badge {
            background: #007AFF;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <a href="profile.html" class="back">←</a>
        <span>分类管理</span>
    </div>

    <div class="header">
        <h1>🏷️ 分类管理</h1>
        <p>管理任务分类，添加、编辑、删除</p>
    </div>

    <div class="content" style="padding-bottom: 100px;">
        <div class="card">
            <div class="card-title">➕ 添加新分类</div>
            <div class="add-form">
                <input type="text" id="newCategoryName" placeholder="输入分类名称，如：设计">
                <button class="btn-add" onclick="addCategory()">添加</button>
            </div>
        </div>

        <div class="edit-form" id="editForm">
            <h3>✏️ 编辑分类</h3>
            <input type="text" id="editCategoryName" placeholder="分类名称">
            <div class="edit-actions">
                <button class="btn-save" onclick="saveEdit()">保存</button>
                <button class="btn-cancel" onclick="cancelEdit()">取消</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 当前分类列表</div>
            <div class="category-list" id="categoryList"></div>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">
            <div class="tab-icon">🏠</div>
            <div>首页</div>
        </a>
        <a href="chat.html" class="tab-item">
            <div class="tab-icon">💬</div>
            <div>聊天</div>
        </a>
        <a href="publish.html" class="tab-item">
            <div class="tab-icon">📝</div>
            <div>发布</div>
        </a>
        <a href="profile.html" class="tab-item active">
            <div class="tab-icon">👤</div>
            <div>我的</div>
        </a>
    </div>

    <script>
        // 默认分类
        const DEFAULT_CATEGORIES = [
            { name: '设计', icon: '🎨', color: '#fff0f5' },
            { name: '开发', icon: '💻', color: '#f0f8ff' },
            { name: '文案', icon: '✍️', color: '#f0fff0' },
            { name: '翻译', icon: '🌐', color: '#fffacd' },
            { name: '摄影', icon: '📷', color: '#fff5ee' },
            { name: '视频', icon: '🎬', color: '#f5f5f5' },
            { name: '音频', icon: '🎵', color: '#f0ffff' },
            { name: '营销', icon: '📢', color: '#fef0f5' },
            { name: '商务', icon: '💼', color: '#f5f0ff' },
            { name: '其他', icon: '📦', color: '#fafafa' }
        ];

        let editingIndex = -1;

        // 获取分类列表
        function getCategories() {
            let categories = localStorage.getItem('taskCategories');
            if (!categories) {
                categories = DEFAULT_CATEGORIES;
                saveCategories(categories);
            } else {
                categories = JSON.parse(categories);
            }
            return categories;
        }

        // 保存分类列表
        function saveCategories(categories) {
            localStorage.setItem('taskCategories', JSON.stringify(categories));
        }

        // 渲染分类列表
        function renderCategories() {
            const categories = getCategories();
            const list = document.getElementById('categoryList');

            if (categories.length === 0) {
                list.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <div>暂无分类，请添加</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = categories.map((cat, index) => `
                <div class="category-item">
                    <div class="category-icon" style="background: ${cat.color}">${cat.icon}</div>
                    <div class="category-info">
                        <div class="category-name">${cat.name}</div>
                        <div class="category-count">任务数：${getTaskCountByCategory(cat.name)}</div>
                    </div>
                    <div class="category-actions">
                        <button class="btn-icon btn-edit" onclick="startEdit(${index})">✏️</button>
                        <button class="btn-icon btn-delete" onclick="deleteCategory(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // 获取某分类的任务数
        function getTaskCountByCategory(categoryName) {
            const userTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            return userTasks.filter(t => t.category === categoryName).length;
        }

        // 添加分类
        function addCategory() {
            const input = document.getElementById('newCategoryName');
            const name = input.value.trim();

            if (!name) {
                showToast('请输入分类名称');
                return;
            }

            const categories = getCategories();

            // 检查是否已存在
            if (categories.some(c => c.name === name)) {
                showToast('该分类已存在');
                return;
            }

            // 生成随机图标和颜色
            const icons = ['📁', '🏷️', '🎯', '⭐', '💡', '🔧', '📨', '🎁', '📌', '🔖'];
            const colors = ['#fff5f5', '#f0f5ff', '#f5fff0', '#fffef0', '#fff0f8', '#f0f8ff'];

            categories.push({
                name: name,
                icon: icons[Math.floor(Math.random() * icons.length)],
                color: colors[Math.floor(Math.random() * colors.length)]
            });

            saveCategories(categories);
            renderCategories();
            input.value = '';
            showToast('分类添加成功');
        }

        // 开始编辑
        function startEdit(index) {
            editingIndex = index;
            const categories = getCategories();
            document.getElementById('editCategoryName').value = categories[index].name;
            document.getElementById('editForm').classList.add('active');
        }

        // 保存编辑
        function saveEdit() {
            const newName = document.getElementById('editCategoryName').value.trim();
            if (!newName) {
                showToast('请输入分类名称');
                return;
            }

            const categories = getCategories();

            // 更新分类名称
            const oldName = categories[editingIndex].name;
            categories[editingIndex].name = newName;
            saveCategories(categories);

            // 更新所有任务的分类名称
            const userTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            userTasks.forEach(task => {
                if (task.category === oldName) {
                    task.category = newName;
                }
            });
            localStorage.setItem('tasks', JSON.stringify(userTasks));

            cancelEdit();
            renderCategories();
            showToast('分类已更新');
        }

        // 取消编辑
        function cancelEdit() {
            editingIndex = -1;
            document.getElementById('editForm').classList.remove('active');
            document.getElementById('editCategoryName').value = '';
        }

        // 删除分类
        function deleteCategory(index) {
            const categories = getCategories();
            const category = categories[index];

            if (!confirm(`确定删除分类「${category.name}」吗？\n该分类下的任务将变为"未分类"。`)) {
                return;
            }

            // 将该分类的任务改为"其他"
            const userTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            userTasks.forEach(task => {
                if (task.category === category.name) {
                    task.category = '其他';
                }
            });
            localStorage.setItem('tasks', JSON.stringify(userTasks));

            // 删除分类
            categories.splice(index, 1);
            saveCategories(categories);
            renderCategories();
            showToast('分类已删除');
        }

        // 重置为默认分类
        function resetToDefault() {
            if (!confirm('确定重置为默认分类吗？\n这将覆盖当前所有自定义分类。')) {
                return;
            }
            saveCategories(DEFAULT_CATEGORIES);
            renderCategories();
            showToast('已重置为默认分类');
        }

        // Toast提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 2000);
        }

        // 回车添加
        document.getElementById('newCategoryName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addCategory();
        });

        // 初始化
        renderCategories();
    </script>
</body>
</html>
